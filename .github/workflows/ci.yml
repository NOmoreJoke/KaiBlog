name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No pnpm-lock.yaml detected (S0 scaffold). Skipping install and pnpm cache."
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node (with pnpm cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Node (no cache)
        if: steps.lockfile.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Domain purity check
        run: |
          if [ -d src/domain ]; then
            if grep -rE "from ['\"](react|@supabase|@tiptap|axios)" src/domain/ 2>/dev/null; then
              echo "::error::Domain layer must not import framework code."
              exit 1
            fi
          else
            echo "::notice::src/domain not yet created (S0 scaffold)."
          fi

  commit-lint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
